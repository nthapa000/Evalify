# nginx.conf — serves the React SPA and proxies /api to the FastAPI backend.
# Used inside the frontend Docker container.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS resolver.
    # Setting this + using a variable in proxy_pass makes nginx resolve
    # "backend" lazily at request time rather than at startup, so the
    # frontend container starts even if the backend is not yet reachable.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── API reverse proxy ────────────────────────────────────────────────────
    # Forward all /api/* requests to the FastAPI backend container.
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts for Ollama vision + LLM grading (can take 300s+)
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  10s;

        # Allow large file uploads (answer sheets up to 20 MB)
        client_max_body_size 25M;
    }

    # ── Fingerprinted static assets ──────────────────────────────────────────
    # Vite adds content hashes — safe to cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|svg|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # Any path not matched above is served as index.html so React Router
    # can handle client-side navigation
    location / {
        try_files $uri $uri/ /index.html;
    }
}
