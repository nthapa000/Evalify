# nginx.conf — serves the React SPA.
# All unknown paths fall back to index.html so React Router handles client-side navigation.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly; any unknown path → index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted assets aggressively; Vite adds content hashes to filenames
    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
